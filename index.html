<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>topic.earth - Global Intelligence Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='28' fill='%2300d4ff'/%3E%3Cpath d='M32 10 54 54H10Z' fill='%23020b14'/%3E%3Cpath d='M32 20 44 48H20Z' fill='%23ffffff'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="styles.css?v=topic-earth-language-voice-menu-20260430">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Top Bar -->
        <header id="top-bar">
            <div class="logo">topic.earth</div>
            <div class="status">
                <span class="status-dot"></span>
                <span>Live Data Stream</span>
            </div>
            <button id="news-update-btn" class="news-update-btn" title="Update Daily News">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M14 8C14 4.686 11.314 2 8 2C4.686 2 2 4.686 2 8C2 11.314 4.686 14 8 14C11.314 14 14 11.314 14 8Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
                    <path d="M8 5V8L10.5 9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                Update
            </button>
        </header>

        <!-- Left Layer Panel -->
        <aside id="layer-panel">
            <div class="panel-header">Data Layers</div>
            <div id="layer-controls"></div>
        </aside>

        <!-- Globe Container -->
        <main id="globe-container"></main>

        <!-- Right Detail Panel -->
        <aside id="detail-panel" class="hidden">
            <button class="close-btn" id="close-detail" aria-label="Close" title="Close">&times;</button>
            <button class="detail-collapse-btn" data-action="toggle-detail-compact" aria-label="Collapse detail panel" title="Short view">
                <svg class="smart-triangle-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
                    <path d="M9 13.5L3.5 5.5H14.5L9 13.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                </svg>
            </button>
            <div id="detail-compact-summary" class="detail-compact-summary" aria-live="polite"></div>
            <div id="detail-content"></div>
        </aside>

        <!-- Fever Debug Bar (Admin only) -->
        <div id="fever-debug-bar"></div>

        <!-- Loading Indicator -->
        <div id="loading">
            <div class="spinner"></div>
            <p>Initializing Globe...</p>
        </div>
    </div>

    <script src="./shared/widget-bridge.js"></script>
    <script src="./shared/smart-widget-sync.js"></script>
    <script src="./shared/smart-api-sync.js"></script>
    <script src="./shared/smart-ai-api-bridge.js"></script>
    <script>
      window.TOPIC_EARTH_PROFILE = window.TOPIC_EARTH_PROFILE || (['localhost', '127.0.0.1'].includes(location.hostname) ? 'admin' : 'demo');
    </script>
    <script type="module" src="./app.main.js?v=topic-earth-language-voice-menu-20260430"></script>
  
  <style>
    /* Mobile panel visibility rules */
    @media (max-width: 768px) {
      #layer-panel.mobile-hidden {
        transform: translateX(-100%);
        opacity: 0;
        pointer-events: none;
      }
      
      body.space-mode #detail-panel:not(.hidden),
      body.fever-mode #detail-panel:not(.hidden) {
        transform: translateX(0);
        opacity: 1;
      }
    }
  </style>
</body>
</html>
